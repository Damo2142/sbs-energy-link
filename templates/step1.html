<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBS EnergyLink — Setup (1 of 5)</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:#0D1117;color:#F5F5F5;min-height:100vh;display:flex;flex-direction:column}
    .header{background:#161B22;border-bottom:3px solid #C00000;padding:14px 24px;display:flex;align-items:center;gap:12px}
    .header h1{font-size:1.2rem;color:#C00000}
    .header span{font-size:0.8rem;color:#8B949E;margin-left:auto}
    .nav{display:flex;background:#161B22;border-bottom:1px solid #2D333B;padding:0 24px}
    .nav a{padding:10px 18px;font-size:0.8rem;color:#8B949E;text-decoration:none;border-bottom:2px solid transparent}
    .nav a:hover{color:#F5F5F5}
    .nav a.active{color:#F5F5F5;border-bottom-color:#C00000;font-weight:bold}
    .steps{display:flex;background:#0D1117;border-bottom:1px solid #2D333B;padding:0 24px;flex-wrap:wrap}
    .step{padding:12px 16px;font-size:0.78rem;color:#8B949E;border-bottom:3px solid transparent;cursor:default}
    .step.active{color:#F5F5F5;border-bottom-color:#C00000;font-weight:bold}
    .step.done{color:#2EA043}
    .main{flex:1;display:flex;justify-content:center;align-items:center;padding:32px}
    .card{background:#161B22;border:1px solid #2D333B;border-radius:8px;padding:32px;width:100%;max-width:520px}
    .card h2{font-size:1.1rem;margin-bottom:6px}
    .card p{font-size:0.85rem;color:#8B949E;margin-bottom:24px}
    .form-group{margin-bottom:18px}
    label{display:block;font-size:0.78rem;color:#8B949E;margin-bottom:6px}
    input{width:100%;background:#0D1117;border:1px solid #2D333B;border-radius:4px;padding:10px 12px;color:#F5F5F5;font-size:0.9rem}
    input:focus{outline:none;border-color:#C00000}
    .row{display:flex;gap:12px}
    .row .form-group{flex:1}
    .btn{background:#C00000;color:#fff;border:none;border-radius:4px;padding:11px 28px;font-size:0.9rem;cursor:pointer;width:100%;margin-top:8px}
    .btn:hover{background:#a00000}
    .hint{font-size:0.78rem;color:#8B949E;margin-top:4px}
  </style>
</head>
<body>
<div class="header">
  <span style="color:#C00000;font-size:1.3rem">&#9889;</span>
  <h1>SBS EnergyLink</h1>
  <span>Setup Wizard</span>
</div>
<div class="nav">
  <a href="/step1" class="active">Setup Wizard</a>
  <a href="/dashboard">Live Data</a>
</div>
<div class="steps">
  <div class="step active">1 &middot; Site Info</div>
  <div class="step">2 &middot; EPMS / eth0</div>
  <div class="step">3 &middot; BAS / eth1</div>
  <div class="step">4 &middot; Confirm</div>
  <div class="step">5 &middot; Handoff</div>
</div>
<div class="main">
  <div class="card">
    <h2>Step 1 &mdash; Site Information</h2>
    <p>Enter the site details and the unit ID from the panel label.</p>
    <form method="POST" action="/step1">
      <div class="form-group">
        <label>Site Name</label>
        <input type="text" name="site_name" value="{{ cfg.site_name or '' }}"
               placeholder="e.g. Main Street Office BESS" required>
      </div>
      <div class="form-group">
        <label>Unit ID <span style="color:#8B949E">(from panel label)</span></label>
        <input type="text" name="unit_id_label" value="{{ cfg.unit_id_label or '' }}"
               placeholder="e.g. SBS-EL-0001">
      </div>
      <div class="row">
        <div class="form-group">
          <label>Engineer Name</label>
          <input type="text" name="engineer_name" value="{{ cfg.engineer_name or '' }}"
                 placeholder="Who is commissioning this unit">
        </div>
        <div class="form-group">
          <label>Install Date</label>
          <input type="date" name="install_date" value="{{ cfg.install_date or '' }}">
        </div>
      </div>
      <button type="submit" class="btn">Continue &rarr;</button>
    </form>
  </div>
</div>
</body>
</html>
